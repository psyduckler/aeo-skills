name: tests

on:
  push:
    branches: [main, v2-foundation, "v2-**"]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke tests
        run: python3 tests/test_compile.py

      - name: Run per-skill extraction tests
        run: |
          # Find every test_*.py inside any */tests/ subdirectory and run via unittest.
          # Each skill's tests/ is self-contained (manages its own sys.path).
          fail=0
          while IFS= read -r tf; do
            tf="${tf#./}"
            echo ""
            echo "── Running $tf"
            python3 -m unittest "$tf" -v || fail=1
          done < <(find . -path './*/tests/test_*.py' -not -path './tests/*' -not -path './node_modules/*')
          if [ "$fail" -ne 0 ]; then
            echo "::error::Per-skill tests failed"
            exit 1
          fi

  schema-validation:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: python3 -m pip install --quiet jsonschema

      - name: Validate every schema is valid JSON Schema
        run: |
          for schema in schemas/*.json; do
            echo "Validating $schema"
            python3 -c "
          import json, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open('$schema'))
          Draft202012Validator.check_schema(schema)
          print('  ok')
          "
          done

      - name: Validate example fixtures against aeo-evidence-v1
        run: |
          python3 - <<'PY'
          import glob, json, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open('schemas/aeo-evidence-v1.json'))
          validator = Draft202012Validator(schema)
          fixtures = glob.glob('examples/*/aeo-data/*.json')
          if not fixtures:
              print('No example fixtures found — nothing to validate')
              sys.exit(0)
          had_errors = False
          for path in fixtures:
              instance = json.load(open(path))
              errors = list(validator.iter_errors(instance))
              if errors:
                  had_errors = True
                  print(f'✗ {path}')
                  for e in errors:
                      print(f'    {".".join(str(x) for x in e.absolute_path)}: {e.message}')
              else:
                  print(f'✓ {path}')
          sys.exit(1 if had_errors else 0)
          PY

      - name: Validate prompt packs against prompt-pack-v1
        run: |
          python3 - <<'PY'
          import glob, json, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open('schemas/prompt-pack-v1.json'))
          validator = Draft202012Validator(schema)
          packs = glob.glob('aeo-pack-*/prompts.json')
          if not packs:
              print('No prompt packs found — nothing to validate')
              sys.exit(0)
          had_errors = False
          for path in packs:
              instance = json.load(open(path))
              errors = list(validator.iter_errors(instance))
              if errors:
                  had_errors = True
                  print(f'✗ {path}')
                  for e in errors:
                      print(f'    {".".join(str(x) for x in e.absolute_path)}: {e.message}')
              else:
                  print(f'✓ {path}')
          sys.exit(1 if had_errors else 0)
          PY

      - name: Verify visibility scores match component contributions
        run: |
          python3 - <<'PY'
          import glob, json, sys
          had_errors = False
          for path in glob.glob('examples/*/aeo-data/*.json'):
              data = json.load(open(path))
              for prompt in data.get('prompts', []):
                  vs = prompt.get('visibility_score')
                  if not vs: continue
                  expected = sum(c['contribution'] for c in vs['components'].values())
                  actual = vs['value']
                  if abs(expected - actual) > 0.01:
                      had_errors = True
                      print(f'✗ {path} prompt {prompt["prompt_id"]}: value={actual}, components sum to {expected}')
                  else:
                      print(f'✓ {path} prompt {prompt["prompt_id"]}: score={actual} matches components')
          sys.exit(1 if had_errors else 0)
          PY

  install-check:
    name: skills.sh install check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: List discoverable skills via npx skills
        run: |
          # Verify that npx skills can find every skill in this repo
          # (Catches frontmatter / folder name / SKILL.md issues)
          # NO_COLOR strips ANSI codes from the CLI's output so grep can read it
          NO_COLOR=1 FORCE_COLOR=0 npx -y skills@latest add ./. --list 2>&1 \
            | sed -r 's/\x1B\[[0-9;]*[mK]//g' \
            | tee /tmp/skills-list.txt
          # Extract the count from "Found N skills"
          count=$(grep -oE "Found [0-9]+ skills" /tmp/skills-list.txt | grep -oE "[0-9]+" | head -1)
          if [ -z "$count" ]; then
            echo "::error::skills.sh CLI did not emit a 'Found N skills' line"
            exit 1
          fi
          if [ "$count" -lt 14 ]; then
            echo "::error::Expected at least 14 skills, found $count"
            exit 1
          fi
          echo "Discovered $count skills"

      - name: Cold install — single-skill installation works standalone
        run: |
          # Regression test for the v1 bug where skills depended on a sibling
          # /shared/ folder that wasn't present in --skill installs. We install
          # a single Python-using skill to a fresh location and verify its
          # scripts run --help cleanly (proves _shared.py is vendored correctly).
          set -e
          mkdir -p /tmp/cold-install-target && cd /tmp/cold-install-target
          NO_COLOR=1 FORCE_COLOR=0 npx -y skills@latest add "$GITHUB_WORKSPACE" \
            --skill aeo-baseline --copy -y \
            -a claude-code 2>&1 | sed -r 's/\x1B\[[0-9;]*[mK]//g' | tail -20
          # The skill should now be installed as a directory we can find
          INSTALLED=$(find /tmp/cold-install-target -name "baseline.py" -path "*aeo-baseline*" 2>/dev/null | head -1)
          if [ -z "$INSTALLED" ]; then
            echo "::error::aeo-baseline did not install to a discoverable location"
            find /tmp/cold-install-target -type f | head -20
            exit 1
          fi
          echo "Installed at: $INSTALLED"
          # Verify the script + its vendored _shared.py work standalone
          SCRIPT_DIR=$(dirname "$INSTALLED")
          ls -la "$SCRIPT_DIR"
          python3 "$INSTALLED" --help > /dev/null
          # Also verify --doctor exits cleanly when key is missing (no traceback)
          (cd /tmp/cold-install-target && unset GEMINI_API_KEY && python3 "$INSTALLED" --doctor 2>&1 || true) | tee /tmp/doctor-out.txt
          if grep -q "Traceback" /tmp/doctor-out.txt; then
            echo "::error::baseline.py --doctor crashed with traceback when GEMINI_API_KEY missing"
            exit 1
          fi
          echo "✓ Cold install verified: aeo-baseline works standalone"
